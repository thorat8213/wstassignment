<!-- Design a form for online Electricity Bill. Assume suitable fields. 
Validate the form using Javascript. -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Electricity Bill Form | Assignment 4</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcfc;
            display: flex;
            justify-content: center;
            padding: 40px;
        }
        .bill-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 450px;
            border-top: 5px solid #f1c40f; /* Electricity Yellow */
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #34495e;
        }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            box-sizing: border-box;
        }
        .info-text {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 5px;
        }
        .btn-pay {
            background-color: #f1c40f;
            color: #2c3e50;
            padding: 12px;
            border: none;
            width: 100%;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-pay:hover {
            background-color: #f39c12;
        }
    </style>
</head>
<body>

<div class="bill-card">
    <h2>Electricity Bill Payment</h2>
    <form name="elecForm" onsubmit="return validateBill()">
        
        <div class="form-group">
            <label>Consumer Number (12 Digits)</label>
            <input type="text" name="consumerNo" placeholder="Enter 12 digit number">
        </div>

        <div class="form-group">
            <label>Consumer Name</label>
            <input type="text" name="cname" placeholder="Full Name">
        </div>

        <div class="form-group">
            <label>Bill Month</label>
            <select name="billMonth">
                <option value="">--Select Month--</option>
                <option>January 2026</option>
                <option>February 2026</option>
                <option>March 2026</option>
                <option>April 2026</option>
            </select>
        </div>

        <div class="form-group">
            <label>Current Meter Reading (Units)</label>
            <input type="number" name="units" placeholder="e.g. 150">
            <p class="info-text">Enter units consumed this month.</p>
        </div>

        <div class="form-group">
            <label>Email for Receipt</label>
            <input type="text" name="email" placeholder="email@example.com">
        </div>

        <button type="submit" class="btn-pay">Proceed to Pay</button>
    </form>
</div>

<script>
    function validateBill() {
        var form = document.forms["elecForm"];
        var consumerNo = form["consumerNo"].value;
        var cname = form["cname"].value;
        var month = form["billMonth"].value;
        var units = form["units"].value;
        var email = form["email"].value;

        // Consumer Number Validation (Exactly 12 digits)
        var consumerRegex = /^\d{12}$/;
        if (!consumerRegex.test(consumerNo)) {
            alert("Please enter a valid 12-digit Consumer Number.");
            return false;
        }

        // Name Validation
        if (cname.trim() == "") {
            alert("Consumer Name cannot be empty.");
            return false;
        }

        // Month Selection Validation
        if (month == "") {
            alert("Please select a bill month.");
            return false;
        }

        // Units Validation (Must be a positive number)
        if (units == "" || isNaN(units) || units <= 0) {
            alert("Please enter a valid number of units consumed.");
            return false;
        }

        // Email Validation
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert("Please enter a valid email address for the receipt.");
            return false;
        }

        alert("Bill details verified! Redirecting to payment gateway...");
        return true;
    }
</script>

</body>
</html>
