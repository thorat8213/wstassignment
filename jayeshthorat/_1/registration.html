<!-- 1. Create a student Registration form for Job Application. Assume various fields. Validate the form fields using JavaScript. -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form </title>
    <style>
        /* --- CSS STYLES --- */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #eef2f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
        }

        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 3px solid #3498db;
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
            color: #444;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box; /* Crucial for alignment */
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            border-color: #3498db;
            outline: none;
            background-color: #f9f9f9;
        }

        .btn-container {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.3s;
        }

        .submit-btn {
            background-color: #27ae60;
            color: white;
        }

        .reset-btn {
            background-color: #e74c3c;
            color: white;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Job Application</h2>
    <form name="jobForm" onsubmit="return validateForm()">
        
        <div class="form-group">
            <label for="fname">Full Name</label>
            <input type="text" id="fname" name="fname" placeholder="Manish Kalbhor">
        </div>

        <div class="form-group">
            <label for="email">Email ID</label>
            <input type="text" id="email" name="email" placeholder="manish@example.com">
        </div>

        <div class="form-group">
            <label for="mobile">Contact Number</label>
            <input type="text" id="mobile" name="mobile" placeholder="10-digit mobile number">
        </div>

        <div class="form-group">
            <label for="position">Applying for Position</label>
            <select id="position" name="position">
                <option value="">-- Select Position --</option>
                <option value="Dev">Software Developer</option>
                <option value="QA">Quality Assurance</option>
                <option value="UI">UI/UX Designer</option>
            </select>
        </div>

        <div class="btn-container">
            <button type="submit" class="submit-btn">Submit</button>
            <button type="reset" class="reset-btn">Clear</button>
        </div>
    </form>
</div>

<script>
    /* --- JAVASCRIPT VALIDATION --- */
    function validateForm() {
        // Get form values
        var name = document.forms["jobForm"]["fname"].value;
        var email = document.forms["jobForm"]["email"].value;
        var mobile = document.forms["jobForm"]["mobile"].value;
        var position = document.forms["jobForm"]["position"].value;

        // Name Validation
        if (name.trim() == "") {
            alert("Please enter your full name.");
            return false;
        }

        // Email Validation using Regular Expression
        var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
            alert("Please enter a valid email address.");
            return false;
        }

        // Mobile Validation (must be numeric and exactly 10 digits)
        var mobileRegex = /^[0-9]{10}$/;
        if (!mobileRegex.test(mobile)) {
            alert("Please enter a valid 10-digit mobile number.");
            return false;
        }

        // Position Validation
        if (position == "") {
            alert("Please select a position to apply for.");
            return false;
        }

        alert("Form submitted successfully!");
        return true;
    }
</script>

</body>
</html>
