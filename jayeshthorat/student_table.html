<!DOCTYPE html>
<html>
<head>
    <title>Student Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <h3 class="text-center mb-4">Registered Students</h3>

    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Gender</th>   
                <th>DOB</th>
                <th>Mobile</th>
                <th>Address</th>
                <th>Course</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="text-center">
        <a href="student.html" class="btn btn-primary">Add New Student</a>
    </div>
</div>

<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let tableBody = document.getElementById("tableBody");

function loadTable() {
    tableBody.innerHTML = "";
    students.forEach((s, index) => {
        let row = `<tr>
            <td>${s.name}</td>
            <td>${s.email}</td>
            <td>${s.gender || ''}</td>   
            <td>${s.dob}</td>
            <td>${s.mobile}</td>
            <td>${s.address}</td>
            <td>${s.course}</td>
            <td>
                <button class="btn btn-sm btn-warning me-1" onclick="editStudent(${index})">Edit</button>
                <button class="btn btn-sm btn-danger" onclick="deleteStudent(${index})">Delete</button>
            </td>
        </tr>`;
        tableBody.innerHTML += row;
    });
}

function deleteStudent(index) {
    if (confirm("Are you sure you want to delete this record?")) {
        students.splice(index, 1);
        localStorage.setItem("students", JSON.stringify(students));
        loadTable();
    }
}

function editStudent(index) {
    localStorage.setItem("editIndex", index);
    window.location.href = "student.html";
}

loadTable();
</script>

</body>
</html>
