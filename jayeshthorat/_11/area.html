
<!-- Write a JavaScript to find area of circle and triangle -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Area Calculator | Assignment 11</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .calc-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 350px;
        }
        h2 { color: #2c3e50; text-align: center; }
        h3 { border-left: 4px solid #3498db; padding-left: 10px; margin-top: 20px; }
        input {
            width: 100%;
            padding: 8px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #2980b9; }
        .result {
            margin-top: 10px;
            font-weight: bold;
            color: #27ae60;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Area Calculator</h2>

    <h3>Circle</h3>
    <input type="number" id="radius" placeholder="Enter Radius">
    <button onclick="calcCircle()">Calculate Circle Area</button>
    <p id="circleRes" class="result"></p>

    <h3>Triangle</h3>
    <input type="number" id="base" placeholder="Enter Base">
    <input type="number" id="height" placeholder="Enter Height">
    <button onclick="calcTriangle()">Calculate Triangle Area</button>
    <p id="triRes" class="result"></p>
</div>

<script>
    // Area of Circle: π * r²
    function calcCircle() {
        const r = document.getElementById('radius').value;
        if (r > 0) {
            const area = Math.PI * Math.pow(r, 2);
            document.getElementById('circleRes').innerText = "Area: " + area.toFixed(2);
        } else {
            alert("Please enter a positive radius");
        }
    }

    // Area of Triangle: (base * height) / 2
    function calcTriangle() {
        const b = document.getElementById('base').value;
        const h = document.getElementById('height').value;
        if (b > 0 && h > 0) {
            const area = (b * h) / 2;
            document.getElementById('triRes').innerText = "Area: " + area.toFixed(2);
        } else {
            alert("Please enter positive values for base and height");
        }
    }
</script>

</body>
</html>
