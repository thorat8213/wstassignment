<!DOCTYPE html>
<html>
<head>
    <title>Button Click</title>
</head>
<body>

<button id="myBtn">Click Me</button>
<p id="msg"></p>

<script >
document.getElementById("myBtn").addEventListener("click", function() {
    document.getElementById("msg").textContent = "Button was clicked!";
});


</script>

</body>
</html>
