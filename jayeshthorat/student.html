<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Registration Form</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card shadow p-4">
                <h3 class="text-center mb-4">Student Registration Form</h3>


               
                <form action="student_table.html" onsubmit="return openConfirmModal();" onsubmit="return handleSubmit();" onsubmit="return validateForm();" id="studentForm">

                    <div class="mb-3">
                        <label class="form-label">Student Name</label>
                        <input type="text" class="form-control" id="name" name="name" placeholder="Full Name" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="example@gmail.com" required>
                    </div>

                  
                    <div class="mb-3">
                        <label class="form-label d-block">Gender</label>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="male" value="Male" required>
                            <label class="form-check-label" for="male">Male</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="gender" id="female" value="Female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Date of Birth</label>
                        <input type="date" class="form-control" id="dob" name="dob" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Mobile Number</label>
                        <input type="number" class="form-control" id="mobile" name="mobile" maxlength="10" placeholder="10-digit Mobile" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" id="address" name="address" rows="3" placeholder="Full Address" required></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Course</label>
                        <select class="form-select" id="course" name="course" required>
                            <option value="">-- Select Course --</option>
                            <option>BCA</option>
                            <option>BBA</option>
                            <option>MCA</option>
                            <option>MBA</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">Register</button>
                        <button type="reset" class="btn btn-outline-secondary">Clear</button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>


<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
<script>
let students = JSON.parse(localStorage.getItem("students")) || [];
let editIndex = localStorage.getItem("editIndex");

const form = document.getElementById("studentForm");
const formTitle = document.getElementById("formTitle");
const submitBtn = document.getElementById("submitBtn");

// Convert editIndex to number properly
if (editIndex !== null) {
    editIndex = parseInt(editIndex);

    let student = students[editIndex];

    if (student) {
        document.getElementById("name").value = student.name || "";
        document.getElementById("email").value = student.email || "";
        document.getElementById("gender").value = student.gender || "";
        document.getElementById("dob").value = student.dob || "";
        document.getElementById("mobile").value = student.mobile || "";
        document.getElementById("address").value = student.address || "";
        document.getElementById("course").value = student.course || "";

        formTitle.innerText = "Edit Student";
        submitBtn.innerText = "Update";
        submitBtn.classList.remove("btn-success");
        submitBtn.classList.add("btn-warning");
    }
}

// SAVE / UPDATE
form.addEventListener("submit", function(e) {
    e.preventDefault();

    let studentData = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        gender: document.getElementById("gender").value,
        dob: document.getElementById("dob").value,
        mobile: document.getElementById("mobile").value,
        address: document.getElementById("address").value,
        course: document.getElementById("course").value
    };

    if (editIndex !== null) {
        students[editIndex] = studentData;  // UPDATE
        localStorage.removeItem("editIndex");
    } else {
        students.push(studentData);         // NEW SAVE
    }

    localStorage.setItem("students", JSON.stringify(students));
    window.location.href = "student_table.html";
});
</script>




<div class="modal fade" id="confirmModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered modal-sm">
    <div class="modal-content animate__animated animate__zoomIn">
      <div class="modal-header bg-primary text-white">
        <h5 class="modal-title">Confirm Registration</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body text-center">
        <p>✨ Are you sure you want to register this student?</p>
      </div>
      <div class="modal-footer justify-content-center">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-success" id="confirmBtn">Yes, Register</button>
      </div>
    </div>
  </div>
</div>

</body>
</html>
